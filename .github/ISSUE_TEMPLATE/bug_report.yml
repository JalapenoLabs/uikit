name: Bug report
description: Report a defect in a component, hook, or utility.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. A minimal reproduction is the single most
        helpful thing you can include.
  - type: input
    id: version
    attributes:
      label: Package version
      description: Which version of `@jalapenolabs/uikit` are you on?
      placeholder: e.g. 0.1.3
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the library does this affect?
      options:
        - Component
        - Hook
        - Utility
        - Build / types / packaging
        - Documentation
        - Other
    validations:
      required: true
  - type: input
    id: export
    attributes:
      label: Affected export
      description: The component, hook, or utility name, if applicable.
      placeholder: e.g. CoverageRing, useSelection, clipText
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug, including what you expected versus what actually occurred.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Steps to reproduce, ideally a minimal code sample or a link to a sandbox.
      render: tsx
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      value: |
        - React:
        - Bundler (Vite / webpack / Next / ...):
        - Browser:
        - OS:
    validations:
      required: true
  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight checklist
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: I am using a supported React version (>= 18).
          required: true
