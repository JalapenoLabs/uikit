#
# Builds the Storybook static site and deploys it to GitHub Pages. Kept separate
# from the release pipeline on purpose: docs must publish even when an npm
# release fails, and a docs-only change should never require a version bump.
#
# The github-pages environment only permits deployments from `main`, so this
# runs on pushes to main and on manual dispatch.

name: Docs

on:
  push:
    # TEMPORARY: develop is included to publish the pre-1.0 docs before the
    # first release lands on main. Revert to [ main ] once main is live.
    branches: [ main, develop ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; let an in-progress deploy finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy Storybook
    runs-on: [ self-hosted, fedora ]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build Storybook
        run: yarn build-storybook

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Storybook artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: storybook-static

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
