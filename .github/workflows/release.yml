# Copyright © 2026 Jalapeno Labs
#
# Stable-branch release pipeline. A push to `main` (typically a merge from
# `develop`) auto-bumps the patch version with release-it, tags it, publishes to
# both the public npm registry and GitHub Packages, then builds Storybook and
# deploys it to GitHub Pages.
#
# release-it commits the version bump back to main with `[skip ci]`; pushes made
# with GITHUB_TOKEN do not re-trigger workflows, so there is no release loop.
#
# Publishing to npm uses Trusted Publishing (OIDC), so there is NO npm token to
# manage. See https://docs.npmjs.com/trusted-publishers. Requirements:
#   - this job has `id-token: write` (set below),
#   - npm CLI >= 11.5.1 (Node 24's bundled npm already satisfies this),
#   - a Trusted Publisher is configured on npmjs for this package pointing at
#     repo JalapenoLabs/uikit and workflow `release.yml`.
#
# Bootstrap (one time, to avoid the chicken-and-egg): publish the very first
# version manually so the package exists, then add the Trusted Publisher on
# npmjs. Every release after that flows through this workflow with zero secrets.
# Provenance attestation is attached automatically under Trusted Publishing.

name: Release

on:
  push:
    branches: [ main ]

# Never cancel a release midway through publishing.
concurrency:
  group: release-main
  cancel-in-progress: false

# `id-token` is required for npm Trusted Publishing (OIDC). Docs deployment to
# Pages lives in its own workflow (docs.yml), so no `pages` permission here.
permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  release:
    name: Publish
    runs-on: [ self-hosted, fedora ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Pinned exactly. Node 24 bundles npm >= 11.5.1, which is what npm
          # Trusted Publishing (OIDC) requires, so no npm self-upgrade step is
          # needed (self-installing npm proved fragile on the runners).
          #
          # Deliberately NO `registry-url` here: setting it makes setup-node
          # write an `_authToken=${NODE_AUTH_TOKEN}` .npmrc entry and export a
          # placeholder token, which npm then uses instead of performing the
          # OIDC exchange (scoped publishes fail as 404). The default registry
          # is npmjs, so nothing else is needed for Trusted Publishing.
          node-version: 24.15.0

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # Prints the identity this job presents to npmjs so a Trusted Publisher
      # mismatch (repo, workflow filename, environment) is visible in the log
      # instead of surfacing as an opaque ENEEDAUTH. Decodes claims only; the
      # raw ID token is never printed.
      - name: OIDC diagnostics
        run: |
          echo "npm version: $(npm --version)"
          if [ -z "$ACTIONS_ID_TOKEN_REQUEST_URL" ]; then
            echo "OIDC not available: ACTIONS_ID_TOKEN_REQUEST_URL is missing (check id-token permission)"
            exit 0
          fi
          echo "OIDC request URL is present"
          payload=$(curl -sf -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=npm:registry.npmjs.org" \
            | jq -r '.value | split(".")[1]' \
            | tr '_-' '/+' | { read seg; pad=$(( (4 - ${#seg} % 4) % 4 )); printf '%s' "$seg"; printf '=%.0s' $(seq 1 $pad); } \
            | base64 -d 2>/dev/null || true)
          echo "$payload" | jq '{sub, repository, repository_owner, workflow, workflow_ref, job_workflow_ref, environment, ref, event_name}' \
            || echo "Could not decode ID token payload"

      # No NPM token: release-it runs `npm publish`, which authenticates via OIDC
      # Trusted Publishing. `npm.skipChecks` in .release-it.json skips the token
      # precheck that would otherwise fail without a logged-in user.
      - name: Release and publish to npm (Trusted Publishing)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: yarn release-it patch --ci

      - name: Publish to GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm config set @jalapenolabs:registry "https://npm.pkg.github.com"
          npm config set "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}"
          npm publish --registry "https://npm.pkg.github.com" --no-git-checks || \
            npm publish --registry "https://npm.pkg.github.com"
