# Copyright © 2026 Jalapeno Labs
#
# Stable-branch release pipeline. A push to `main` (typically a merge from
# `develop`) auto-bumps the patch version with release-it, tags it, publishes to
# both the public npm registry and GitHub Packages, then builds Storybook and
# deploys it to GitHub Pages.
#
# release-it commits the version bump back to main with `[skip ci]`; pushes made
# with GITHUB_TOKEN do not re-trigger workflows, so there is no release loop.
#
# Required repository secret:
#   NPM_TOKEN - an npm automation token with publish rights to @jalapenolabs.

name: Release

on:
  push:
    branches: [ main ]

# Never cancel a release midway through publishing.
concurrency:
  group: release-main
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  pages: write
  id-token: write

jobs:
  release:
    name: Publish
    runs-on: [ self-hosted, fedora ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Release and publish to npm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: yarn release-it patch --ci

      - name: Publish to GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm config set @jalapenolabs:registry "https://npm.pkg.github.com"
          npm config set "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}"
          npm publish --registry "https://npm.pkg.github.com" --no-git-checks || \
            npm publish --registry "https://npm.pkg.github.com"

  deploy-docs:
    name: Deploy Storybook to Pages
    needs: release
    runs-on: [ self-hosted, fedora ]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout (latest main, includes the release commit)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build Storybook
        run: yarn build-storybook

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Storybook artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: storybook-static

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
