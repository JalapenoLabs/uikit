# Use the classic node_modules layout. PnP is intentionally disabled: it still
# trips up some React tooling and Storybook addons.
nodeLinker: node-modules

enableGlobalCache: false

# Yarn Berry blocks git dependencies unless explicitly approved. The shared
# Jalapeno Labs CLI (ESLint config + tooling) is installed straight from its
# repository, so it must be allowlisted here.
approvedGitRepositories:
  - "https://github.com/jalapenolabs/cli.git"

yarnPath: .yarn/releases/yarn-4.17.0.cjs
